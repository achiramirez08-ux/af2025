<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#111827">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">

<title>Panel de Ruta 360° · Fernando</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<style>
  /* ============ ESTILOS (mantén los que ya tenías) ============ */
  .tnum{font-variant-numeric:tabular-nums}
  .sheet{transition:transform .22s cubic-bezier(.4,0,.2,1);will-change:transform}
  .sheet-hidden{transform:translateY(100%)}
  .backdrop{transition:opacity .2s ease}
  @keyframes pulse-soft{0%,100%{opacity:1}50%{opacity:.45}}
  .pulse-soft{animation:pulse-soft 1.6s ease-in-out infinite}
  .toast{transition:opacity .25s ease,transform .25s ease}
  .tab-section{display:none}
  .tab-section.active{display:block}
  .tab-btn{transition:color .15s;position:relative}
  .tab-btn.active-tab{color:#10b981}
  .tab-btn.active-tab::after{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:24px;height:2px;background:#10b981;border-radius:2px}
  .badge-dnit{font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px}
  .badge-activo{font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px}
  .kpi-card{background:rgba(31,41,55,.7);border:1px solid rgba(55,65,81,.8);border-radius:1rem;padding:1rem}
  .ftab-section.hidden{display:none}
  .prod-rec-item{cursor:pointer;transition:background .15s}
  .prod-rec-item.selected{background:rgba(16,185,129,.12);border-color:rgba(16,185,129,.5)!important}
  .score-bar-fill{transition:width .4s ease;height:6px;border-radius:3px;background:linear-gradient(90deg,#f59e0b,#10b981)}
  body.modal-open{position:fixed;top:0;left:0;width:100%;height:100%;overflow:hidden;-webkit-overflow-scrolling:touch}
  #modal-backdrop,#modal-carga,#ficha-backdrop,#ficha-modal,#edit-backdrop,#edit-modal,#nci-backdrop,#nci-modal{z-index:40}
  #modal-carga,#ficha-modal,#edit-modal,#nci-modal{z-index:50}
</style>
</head>
<body class="bg-gray-900 text-white min-h-screen pb-20" style="-webkit-text-size-adjust:100%;-webkit-tap-highlight-color:transparent">

<!-- ============ HEADER ============ -->
<header class="sticky top-0 z-30 bg-gray-900/95 backdrop-blur border-b border-gray-800">
  <div class="max-w-md mx-auto px-4 pt-3 pb-2">
    <div class="flex justify-between items-center mb-2">
      <div>
        <h1 class="font-bold text-base leading-none">Panel 360°</h1>
        <p class="text-[10px] text-gray-500 mt-0.5">Fernando · Agrofuturo</p>
      </div>
      <div class="text-right flex items-center gap-2">
        <button id="btn-divisa" onclick="App.toggleDivisa()"
          class="text-[10px] font-bold px-2 py-1 rounded-lg bg-gray-800 border border-gray-700 text-gray-400 active:bg-gray-700">
          USD
        </button>
        <div id="kpi-ventas" class="text-emerald-400 font-bold text-lg tnum">$0</div>
      </div>
    </div>
    <button id="status-badge" onclick="App.manualSync()"
      class="w-full flex items-center justify-between gap-2 text-xs font-semibold px-3 py-1.5 rounded-xl border transition-colors">
      <span class="flex items-center gap-2">
        <span id="status-dot" class="h-2 w-2 rounded-full bg-emerald-400"></span>
        <span id="status-text">Verificando…</span>
      </span>
      <span id="status-action" class="text-[11px] underline decoration-dotted opacity-80"></span>
    </button>
  </div>
</header>

<main class="max-w-md mx-auto px-4" style="padding-bottom:80px">
  <!-- ========= TAB: DASHBOARD ========= -->
  <section id="tab-dashboard" class="tab-section active pt-3">
    <!-- ... (todo el HTML de la app, igual que antes) ... -->
    <!-- No lo repito para no alargar, pero debe estar completo -->
  </section>
  <!-- ========= TAB: RUTA ========= -->
  <section id="tab-ruta" class="tab-section pt-4">...</section>
  <!-- ========= TAB: CLIENTES ========= -->
  <section id="tab-clientes" class="tab-section pt-4">...</section>
  <!-- ========= TAB: VENTAS ========= -->
  <section id="tab-ventas" class="tab-section pt-3">...</section>
</main>

<!-- ======== FAB ======== -->
<button id="fab-nuevo-pedido" onclick="App.abrirModal('Venta')" class="fixed bottom-20 right-4 z-40 bg-emerald-500 active:bg-emerald-600 h-14 w-14 rounded-full shadow-lg flex items-center justify-center text-2xl font-bold">+</button>

<!-- ======== BOTTOM NAV ======== -->
<nav class="fixed bottom-0 left-0 right-0 z-30 bg-gray-900 border-t border-gray-800 safe-area-inset-bottom">
  <div class="max-w-md mx-auto grid grid-cols-4 py-1">
    <button class="tab-btn flex flex-col items-center gap-0.5 py-2 active-tab" data-tab="dashboard"><i data-lucide="bar-chart-2" class="h-5 w-5"></i><span class="text-[10px]">Dashboard</span></button>
    <button class="tab-btn flex flex-col items-center gap-0.5 py-2 text-gray-500" data-tab="ruta"><i data-lucide="navigation" class="h-5 w-5"></i><span class="text-[10px]">Ruta</span></button>
    <button class="tab-btn flex flex-col items-center gap-0.5 py-2 text-gray-500" data-tab="clientes"><i data-lucide="users" class="h-5 w-5"></i><span class="text-[10px]">Clientes</span></button>
    <button class="tab-btn flex flex-col items-center gap-0.5 py-2 text-gray-500 relative" data-tab="ventas"><i data-lucide="package" class="h-5 w-5"></i><span class="text-[10px]">Ventas</span><span id="badge-entregas-pendientes" class="hidden absolute -top-1 right-0 bg-red-500 text-white text-[9px] font-bold rounded-full w-4 h-4 flex items-center justify-center">!</span></button>
  </div>
</nav>

<!-- ============ MODALES (todos) ============ -->
<!-- ... (todos los modales igual que antes) ... -->

<!-- ======== TOAST ======== -->
<div id="toast" class="toast fixed bottom-24 left-1/2 -translate-x-1/2 opacity-0 pointer-events-none z-[60] max-w-[90vw]">
  <div class="bg-gray-800 border border-gray-700 text-sm px-4 py-2.5 rounded-xl shadow-lg"></div>
</div>

<script>
"use strict";

// ============ CONFIG ============
const CONFIG = {
  SCRIPT_URL: "https://script.google.com/macros/s/AKfycbyReUNQFPsZI-_djJuIT2kE-u0d_OtVwMdeiJpjhAKCljkwdOB_wMWvSwXmhOJa3ryg/exec",
  SHARED_SECRET: "fernando-ruta-2026-x7k",
  STORAGE_KEY: "rutaFernando.records.v1",
  RETRY_INTERVAL_MS: 20000,
  get DIVISA_DEFAULT(){ return localStorage.getItem("rutaFernando.divisa")||"USD"; },
  set DIVISA_DEFAULT(v){ localStorage.setItem("rutaFernando.divisa",v); }
};

// ============ VARIABLES GLOBALES ============
let CATALOGO = [];
let CLIENTES = [];
let DATOS_CARGADOS = false;

// ============ CARGA DE DATOS CON RUTAS RELATIVAS ============
async function cargarDatos() {
  // URLs directas de GitHub (raw) — 100% confiables
  const urls = {
    catalogo: 'https://raw.githubusercontent.com/achiramirez08-ux/af2025/main/catalogo.json',
    clientes: 'https://raw.githubusercontent.com/achiramirez08-ux/af2025/main/clientes.json'
  };

  try {
    const [catRes, cliRes] = await Promise.all([
      fetch(urls.catalogo),
      fetch(urls.clientes)
    ]);

    if (!catRes.ok || !cliRes.ok) throw new Error('Error al cargar JSON');

    CATALOGO = await catRes.json();
    CLIENTES = await cliRes.json();
    DATOS_CARGADOS = true;

    localStorage.setItem('rutaFernando.datos.cache', JSON.stringify({ CATALOGO, CLIENTES }));
    App.init();

  } catch (err) {
    console.error('Error cargando datos:', err);

    // Fallback a localStorage
    try {
      const cached = JSON.parse(localStorage.getItem('rutaFernando.datos.cache') || 'null');
      if (cached && cached.CATALOGO && cached.CLIENTES) {
        CATALOGO = cached.CATALOGO;
        CLIENTES = cached.CLIENTES;
        DATOS_CARGADOS = true;
        App.init();
        UI.toast('⚠️ Datos cargados desde caché local');
        return;
      }
    } catch(e) {}

    document.getElementById('status-text').textContent = '⚠️ Error cargando datos. Reintentando…';
    setTimeout(cargarDatos, 5000);
  }
}
// ============ INICIO ============
cargarDatos();

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js')
      .then(reg => console.log('[SW] Registrado', reg.scope))
      .catch(err => console.warn('[SW] Error', err));
  });
}
</script>
</body>
</html>
