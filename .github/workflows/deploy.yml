name: Deploy Ruta Fernando

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:

  validate:
    name: Validar HTML y JS
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Verificar archivos requeridos
        run: |
          test -f index.html && echo "✅ index.html" || (echo "❌ Falta index.html" && exit 1)
          test -f sw.js && echo "✅ sw.js" || echo "⚠️ sw.js no encontrado"
          test -f manifest.json && echo "✅ manifest.json" || echo "⚠️ manifest.json no encontrado"
          echo "Tamaño: $(du -sh index.html | cut -f1)"

      - name: Verificar SHARED_SECRET
        run: |
          grep -q 'SHARED_SECRET' index.html \
            && echo "✅ SHARED_SECRET presente" \
            || (echo "❌ SHARED_SECRET no encontrado" && exit 1)

      - name: Verificar Service Worker
        run: |
          grep -q 'serviceWorker' index.html \
            && echo "✅ SW registrado" \
            || echo "⚠️ SW no registrado"

  deploy:
    name: Deploy a GitHub Pages
    needs: validate
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Generar iconos PWA
        run: |
          node -e "
            const { createCanvas } = require('canvas');
            // canvas module may not be available - use pure JS approach
            const fs = require('fs');
            // Create a minimal SVG icon and save as placeholder
            const svg192 = '<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"192\" height=\"192\" viewBox=\"0 0 192 192\"><rect width=\"192\" height=\"192\" fill=\"#1F4E79\"/><text x=\"96\" y=\"120\" font-size=\"80\" text-anchor=\"middle\" fill=\"white\">🌿</text></svg>';
            fs.writeFileSync('icon.svg', svg192);
          " 2>/dev/null || true
          # Generate PNGs from SVG using ImageMagick (available on ubuntu-latest)
          if command -v convert &> /dev/null; then
            convert -background none -size 192x192 xc:'#1F4E79' -fill white -gravity center -pointsize 80 -annotate 0 'AF' icon-192.png 2>/dev/null || echo "⚠️ ImageMagick falló, usando placeholder"
            convert -background none -size 512x512 xc:'#1F4E79' -fill white -gravity center -pointsize 200 -annotate 0 'AF' icon-512.png 2>/dev/null || echo "⚠️ ImageMagick falló, usando placeholder"
            echo "✅ Iconos generados"
          else
            echo "⚠️ ImageMagick no disponible, iconos no generados"
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Mostrar URL
        run: echo "✅ Publicado en ${{ steps.deployment.outputs.page_url }}"
