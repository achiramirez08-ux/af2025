name: Deploy Ruta Fernando

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:

  validate:
    name: Validar HTML y JS
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Verificar archivos requeridos
        run: |
          test -f index.html && echo "✅ index.html" || (echo "❌ Falta index.html" && exit 1)
          test -f sw.js && echo "✅ sw.js" || echo "⚠️ sw.js no encontrado"
          test -f manifest.json && echo "✅ manifest.json" || echo "⚠️ manifest.json no encontrado"
          echo "Tamaño: $(du -sh index.html | cut -f1)"

      - name: Verificar placeholders configurados
        run: |
          grep -q 'GAS_TOKEN_PLACEHOLDER' index.html \
            && echo "✅ Placeholder GAS_TOKEN presente" \
            || (echo "❌ GAS_TOKEN_PLACEHOLDER no encontrado en index.html" && exit 1)
          grep -q 'GAS_URL_PLACEHOLDER' index.html \
            && echo "✅ Placeholder GAS_URL presente" \
            || (echo "❌ GAS_URL_PLACEHOLDER no encontrado en index.html" && exit 1)

  deploy:
    name: Deploy a GitHub Pages
    needs: validate
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inyectar secrets en index.html
        run: |
          sed -i "s|GAS_TOKEN_PLACEHOLDER|${{ secrets.GAS_TOKEN }}|g" index.html
          sed -i "s|GAS_URL_PLACEHOLDER|${{ secrets.GAS_URL }}|g" index.html
          echo "✅ Secrets inyectados"
          # Verificar que la inyección funcionó
          grep -q 'GAS_TOKEN_PLACEHOLDER' index.html \
            && (echo "❌ Secret GAS_TOKEN no fue inyectado - verificá que el secret existe en GitHub" && exit 1) \
            || echo "✅ GAS_TOKEN inyectado correctamente"

      - name: Generar iconos PWA
        run: |
          convert -size 192x192 xc:'#1F4E79' \
            -fill white -gravity center -pointsize 80 \
            -annotate 0 'AF' icon-192.png 2>/dev/null \
            && echo "✅ icon-192.png generado" || echo "⚠️ ImageMagick no disponible"
          convert -size 512x512 xc:'#1F4E79' \
            -fill white -gravity center -pointsize 200 \
            -annotate 0 'AF' icon-512.png 2>/dev/null \
            && echo "✅ icon-512.png generado" || echo "⚠️ ImageMagick no disponible"

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Mostrar URL
        run: echo "✅ Publicado en ${{ steps.deployment.outputs.page_url }}"
