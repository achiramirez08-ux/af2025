name: Deploy Ruta Fernando

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  validate:
    name: Validar archivos esenciales
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verificar archivos requeridos
        run: |
          echo "Verificando archivos del repositorio..."
          test -f index.html && echo "✅ index.html" || (echo "❌ Falta index.html" && exit 1)
          test -f sw.js     && echo "✅ sw.js" || echo "⚠️ sw.js no encontrado (offline no disponible)"
          test -f manifest.json && echo "✅ manifest.json" || echo "⚠️ manifest.json no encontrado"
          echo "---"
          echo "Tamaño de index.html: $(du -sh index.html | cut -f1)"

      - name: Verificar que el SHARED_SECRET no está vacío
        run: |
          if grep -q 'SHARED_SECRET.*""' index.html; then
            echo "❌ SHARED_SECRET vacío — el sync no funcionará"
            exit 1
          fi
          echo "✅ SHARED_SECRET configurado"

      - name: Verificar Service Worker registrado en HTML
        run: |
          if grep -q 'serviceWorker' index.html; then
            echo "✅ Service Worker registrado en HTML"
          else
            echo "⚠️ Service Worker NO registrado — agregar registro en App.init()"
          fi

  deploy:
    name: Deploy a GitHub Pages
    needs: validate
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Notificar URL del deploy
        run: |
          echo "✅ Deploy exitoso"
          echo "🌐 URL: ${{ steps.deployment.outputs.page_url }}"
          echo "📱 Fernando puede abrir esta URL en Chrome Android"
