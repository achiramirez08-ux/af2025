name: Deploy Ruta Fernando

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:

  validate:
    name: Validar HTML y JS
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Verificar sintaxis JS
        run: |
          node -e "
            const fs = require('fs');
            const html = fs.readFileSync('index.html', 'utf8');
            const match = html.match(/<script>([\s\S]*?)<\/script>\s*<\/body>/);
            if (!match) { console.error('No script block'); process.exit(1); }
            const js = match[1].replace(/const CLIENTES = \[[\s\S]*?\];/, 'const CLIENTES = [];');
            fs.writeFileSync('/tmp/test.js', '\"use strict\";\n' + js);
          "
          node --check /tmp/test.js && echo "✅ JS OK" || (echo "❌ JS error" && exit 1)

      - name: Verificar archivos requeridos
        run: |
          test -f index.html && echo "✅ index.html" || (echo "❌ Falta index.html" && exit 1)
          test -f sw.js && echo "✅ sw.js" || echo "⚠️ sw.js no encontrado"
          test -f manifest.json && echo "✅ manifest.json" || echo "⚠️ manifest.json no encontrado"
          echo "Tamaño: $(du -sh index.html | cut -f1)"

      - name: Verificar type=button en todos los botones
        run: |
          BTNS=$(grep -o "<button " index.html | wc -l | tr -d ' ')
          TYPED=$(grep -o 'type="button"' index.html | wc -l | tr -d ' ')
          if [ "$BTNS" -ne "$TYPED" ]; then
            echo "❌ $BTNS botones, solo $TYPED con type=button"
            exit 1
          fi
          echo "✅ Todos los botones tienen type=button ($BTNS/$TYPED)"

      - name: Verificar SHARED_SECRET
        run: |
          grep -q 'SHARED_SECRET' index.html \
            && echo "✅ SHARED_SECRET presente" \
            || (echo "❌ SHARED_SECRET no encontrado" && exit 1)

      - name: Verificar Service Worker
        run: |
          grep -q 'serviceWorker' index.html \
            && echo "✅ SW registrado" \
            || echo "⚠️ SW no registrado"

  deploy:
    name: Deploy a GitHub Pages
    needs: validate
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Mostrar URL
        run: echo "✅ Publicado en ${{ steps.deployment.outputs.page_url }}"
